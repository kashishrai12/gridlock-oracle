# Streamlit base theme — makes native chrome (spinners, tooltips, widgets,
# the running indicator) match the Gridlock Oracle palette so nothing renders
# in default Streamlit red/white. The app's own CSS still drives the light/dark
# toggle; this just sets a sensible base so native elements never clash.

[theme]
base = "light"
primaryColor = "#4338CA"
backgroundColor = "#F3F4F8"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#15171F"
font = "sans serif"

[client]
toolbarMode = "minimal"

[ui]
hideTopBar = true